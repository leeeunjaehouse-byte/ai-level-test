<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI레벨테스트 · 어드민</title>
<style>
  :root{--page:#0f1115;--card:#171a21;--card2:#1e222b;--line:#2a2f3a;--txt:#e7eaf0;--sub:#9aa3b2;--blue:#6ea8fe;--good:#46d39a;--pink:#e879a6;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--page);color:var(--txt);font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;padding:28px 16px;}
  .wrap{max-width:820px;margin:0 auto;}
  h1{font-size:22px;margin:0 0 4px;} .meta{color:var(--sub);font-size:13px;margin-bottom:20px;}
  .gate{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;max-width:380px;margin:60px auto;text-align:center;}
  .gate input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:15px;margin:12px 0;}
  .gate button,.reload{background:var(--blue);color:#0b1322;border:0;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer;font-size:14px;}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .kpi .n{font-size:30px;font-weight:800;} .kpi .l{color:var(--sub);font-size:12px;margin-top:2px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;}
  .card h2{font-size:15px;margin:0 0 12px;} .card h3{font-size:13px;color:var(--blue);margin:14px 0 6px;font-weight:700;}
  .qq{font-size:12.5px;color:var(--sub);margin:10px 0 6px;}
  .row{display:flex;align-items:center;gap:10px;margin:5px 0;font-size:13px;}
  .row .lab{width:160px;flex-shrink:0;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row .barwrap{flex:1;background:var(--card2);border-radius:99px;height:18px;overflow:hidden;}
  .row .bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--good));border-radius:99px;min-width:2px;}
  .row .v{width:54px;text-align:right;color:var(--sub);font-variant-numeric:tabular-nums;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);color:var(--sub);}
  th{color:var(--txt);}
  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tab{padding:8px 14px;border-radius:99px;background:var(--card2);border:1px solid var(--line);cursor:pointer;font-size:13px;font-weight:700;color:var(--sub);}
  .tab.on{background:var(--blue);color:#0b1322;border-color:var(--blue);}
  .empty{color:var(--sub);font-size:13px;padding:8px 0;}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const QLABELS = {
  "위임1":{q:"새 일이 생기면 'AI 쓸까?'를", o:["거의 안 따진다","떠오르면 가끔","의식적으로 가른다"]},
  "위임2":{q:"큰 작업을 맡길 때",            o:["통째로 던진다","가끔 나눈다","단계로 쪼개 조율"]},
  "서술1":{q:"첫 프롬프트",                  o:["핵심만 한 줄","한두 문장 설명","역할·맥락·제약·예시"]},
  "서술2":{q:"출력 형식·톤·길이",            o:["거의 안 지정","가끔 지정","또박또박 지정"]},
  "분별1":{q:"AI 답이 나오면",               o:["그대로 신뢰","어색한 것만 손봄","기준 갖고 평가"]},
  "분별2":{q:"틀린 답 가능성",               o:["별로 의식 안 함","중요할 때 의심","항상 교차확인"]},
  "책임1":{q:"결과물 최종 책임",             o:["AI 몫도 있다","반반","전적으로 내 책임"]},
  "책임2":{q:"민감·저작권·편향",             o:["신경 안 씀","가끔 점검","습관적 점검"]},
};
const app = document.getElementById('app');
let DATA=null, view='serious';

function bars(obj, labels){
  const entries = labels
    ? labels.map((l,i)=>[l, obj[i]||0])
    : Object.entries(obj||{}).sort((a,b)=>b[1]-a[1]);
  const max = Math.max(1, ...entries.map(e=>e[1]));
  if(!entries.length || entries.every(e=>!e[1])) return '<div class="empty">아직 데이터 없음</div>';
  return entries.map(([k,v])=>`<div class="row"><div class="lab" title="${k}">${k}</div><div class="barwrap"><div class="bar" style="width:${v/max*100}%"></div></div><div class="v">${v}</div></div>`).join('');
}

function renderGate(msg){
  app.innerHTML = `<div class="gate"><h1>🔒 어드민</h1><div class="meta">${msg||'관리자 키를 입력하세요'}</div>
    <input id="key" type="password" placeholder="admin key" />
    <button onclick="login()">들어가기</button></div>`;
  const el=document.getElementById('key'); el.focus();
  el.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
}
function login(){ const k=document.getElementById('key').value.trim(); sessionStorage.setItem('ak',k); load(); }

async function load(){
  const k=sessionStorage.getItem('ak')||'';
  app.innerHTML='<div class="meta">불러오는 중…</div>';
  try{
    const r=await fetch('/api/stats?key='+encodeURIComponent(k));
    if(r.status===401){ renderGate('키가 올바르지 않아요'); return; }
    DATA=await r.json();
    if(DATA.configured===false){ app.innerHTML='<div class="card">저장소(KV)가 아직 연결되지 않았어요. 배포 설정에서 KV를 연결하면 집계가 시작됩니다.</div>'; return; }
    render();
  }catch(e){ app.innerHTML='<div class="card">불러오기 실패: '+e+'</div>'; }
}

function render(){
  const d=DATA;
  const recentRows=(d.recent||[]).map(x=>`<tr><td>${new Date(x.t).toLocaleString('ko-KR')}</td><td>${x.v||''}</td><td>${x.sector||''}</td><td>${x.level||''}</td><td>${x.mode||''}</td><td>${x.overall??''}</td></tr>`).join('') || '<tr><td colspan=6 class="empty">없음</td></tr>';

  let qBlock='';
  if(view==='serious'){
    qBlock = Object.keys(QLABELS).map(qid=>{
      const meta=QLABELS[qid], counts=(d.q_serious&&d.q_serious[qid])||{};
      return `<h3>${qid} — ${meta.q}</h3>${bars(counts, meta.o)}`;
    }).join('');
  } else {
    qBlock = `<div class="qq">꺼드럭 버전은 문항별 선택을 인덱스로 집계합니다.</div>` +
      Object.keys(d.q_fun||{}).map(qid=>`<h3>${qid}</h3>${bars(d.q_fun[qid])}`).join('');
  }

  app.innerHTML = `
    <div class="top"><div><h1>📊 AI레벨테스트 어드민</h1><div class="meta">선택 로그 집계 · 익명</div></div>
      <button class="reload" onclick="load()">새로고침</button></div>
    <div class="kpis">
      <div class="kpi"><div class="n">${d.total||0}</div><div class="l">총 완료</div></div>
      <div class="kpi"><div class="n">${d.total_serious||0}</div><div class="l">진지 버전</div></div>
      <div class="kpi"><div class="n">${d.total_fun||0}</div><div class="l">꺼드럭 버전</div></div>
    </div>
    <div class="tabs">
      <div class="tab ${view==='serious'?'on':''}" onclick="view='serious';render()">진지(4D)</div>
      <div class="tab ${view==='fun'?'on':''}" onclick="view='fun';render()">꺼드럭</div>
    </div>
    <div class="card"><h2>레벨 분포</h2>${bars(view==='serious'?d.level_s:d.level_f)}</div>
    <div class="card"><h2>섹터 분포</h2>${bars(view==='serious'?d.sector_s:d.sector_f)}</div>
    ${view==='serious'?`<div class="card"><h2>작업 모드 분포</h2>${bars(d.mode_s)}</div>`:''}
    <div class="card"><h2>문항별 선택 분포</h2>${qBlock}</div>
    <div class="card"><h2>최근 응답 (최대 50)</h2><table><tr><th>시각</th><th>버전</th><th>섹터</th><th>레벨</th><th>모드</th><th>점수</th></tr>${recentRows}</table></div>`;
}

if(sessionStorage.getItem('ak')) load(); else renderGate();
</script>
</body>
</html>
