<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 활용 역량 진단 · 4D 프레임워크</title>
<meta name="description" content="앤트로픽 AI Fluency 4D 프레임워크 기반 자가진단. 당신의 AI 활용 역량을 위임·서술·분별·책임 4축으로 측정합니다.">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  :root{
    --page:#f2f4f6; --card:#fff; --ink:#191f28; --sub:#8b95a1; --sub2:#4e5968;
    --blue:#3182f6; --blue-bg:#e8f3ff; --line:#e5e8eb; --line2:#f2f4f6; --navy:#0b2447;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--page); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased; display:flex; justify-content:center; min-height:100vh; padding:20px 14px;}
  .app{width:100%; max-width:440px;}
  .card{background:var(--card); border-radius:24px; padding:30px 24px; box-shadow:0 4px 16px rgba(0,0,0,.05);}
  h1{font-size:23px; font-weight:800; letter-spacing:-.03em; margin:0 0 8px; line-height:1.4;}
  .sub{color:var(--sub); font-size:14.5px; line-height:1.62; letter-spacing:-.01em;}
  .center{text-align:center;}
  .kicker{display:inline-block; background:var(--blue-bg); color:var(--blue); font-size:12px; font-weight:700;
    padding:5px 11px; border-radius:99px; letter-spacing:-.01em; margin-bottom:14px;}
  .btn{display:block; width:100%; border:0; cursor:pointer; font-size:16.5px; font-weight:700; color:#fff;
    background:var(--blue); padding:16px; border-radius:14px; letter-spacing:-.01em; transition:transform .1s, background .15s;}
  .btn:active{transform:scale(.98); background:#1b64da;}
  .btn.sec{background:var(--line2); color:var(--sub2); margin-top:8px;}
  .btnrow{display:flex; gap:8px;} .btnrow .btn{margin-top:0;}
  .topbar{display:flex; align-items:center; gap:12px; margin-bottom:22px;}
  .progress{flex:1; height:6px; background:var(--line2); border-radius:99px; overflow:hidden;}
  .progress>span{display:block; height:100%; width:0; background:var(--blue); border-radius:99px; transition:width .35s cubic-bezier(.2,.8,.2,1);}
  .pcount{font-size:12.5px; font-weight:700; color:var(--sub); font-variant-numeric:tabular-nums;}
  .dimtag{font-size:12px; font-weight:700; color:var(--blue); letter-spacing:-.01em; margin-bottom:6px;}
  .q{font-size:20px; font-weight:800; letter-spacing:-.03em; line-height:1.42; margin:0 0 20px;}
  .opt{display:flex; align-items:center; gap:12px; background:#fff; border:1.5px solid var(--line);
    border-radius:14px; padding:15px 15px; margin-bottom:10px; cursor:pointer; font-size:15px;
    font-weight:600; letter-spacing:-.01em; color:var(--ink); line-height:1.4; transition:border-color .12s, background .12s, transform .08s;}
  .opt:active{transform:scale(.985); background:var(--blue-bg); border-color:var(--blue);}
  .opt .emo{font-size:20px; flex-shrink:0;}
  .sgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .sector{background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:17px 8px; text-align:center; cursor:pointer; transition:border-color .12s, transform .08s, background .12s;}
  .sector:active{transform:scale(.96); border-color:var(--blue); background:var(--blue-bg);}
  .sector .se{font-size:26px;} .sector .sn{font-size:13px; font-weight:700; margin-top:6px; letter-spacing:-.02em;}
  .reveal{animation:rise .45s cubic-bezier(.2,.8,.2,1);} @keyframes rise{from{opacity:0; transform:translateY(14px)}to{opacity:1; transform:none}}
  .secTag{font-size:12.5px; font-weight:700; color:var(--sub); text-align:center; margin-bottom:14px;}
  .ring{position:relative; width:140px; height:140px; margin:0 auto 6px;}
  .ring svg{transform:rotate(-90deg);}
  .ring .ctr{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring .num{font-size:38px; font-weight:800; letter-spacing:-.04em; line-height:1; font-variant-numeric:tabular-nums;}
  .ring .of{font-size:12px; color:var(--sub); margin-top:2px;}
  .tier{text-align:center; font-size:27px; font-weight:800; letter-spacing:-.03em; margin:6px 0 4px;}
  .tierd{text-align:center; color:var(--sub2); font-size:14.5px; line-height:1.55; letter-spacing:-.01em; margin:0 10px 16px;}
  .radar{display:block; margin:4px auto 6px;}
  .modebox{text-align:center; background:var(--navy); color:#fff; border-radius:16px; padding:16px; margin:12px 0;}
  .modebox .mn{font-size:17px; font-weight:800; letter-spacing:-.02em;}
  .modebox .md{font-size:13px; color:#aebdd6; margin-top:4px; line-height:1.5;}
  .box{background:var(--line2); border-radius:14px; padding:15px 16px; margin:12px 0;}
  .box h3{margin:0 0 7px; font-size:13.5px; font-weight:800; color:var(--ink); letter-spacing:-.02em;}
  .box p{margin:0; font-size:13.8px; line-height:1.6; color:var(--sub2); letter-spacing:-.01em;}
  .drow{display:flex; justify-content:space-between; align-items:center; font-size:13.5px; margin-top:9px; color:var(--sub2);}
  .drow b{color:var(--ink); font-weight:700;}
  .bar{height:7px; background:#e9edf2; border-radius:99px; overflow:hidden; margin:3px 0 10px;}
  .bar>span{display:block; height:100%; background:linear-gradient(90deg,var(--blue),#5fd9b0); border-radius:99px;}
  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:#191f28; color:#fff; padding:13px 20px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; transition:.3s; pointer-events:none; z-index:9;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .foot{text-align:center; color:#b0b8c1; font-size:11px; margin-top:14px; line-height:1.6;}
</style>
</head>
<body>
<div class="app">
  <div class="card" id="card"></div>
  <div class="foot">앤트로픽이 공개한 <b>AI Fluency 4D 프레임워크</b>를 참고한 자가진단입니다 · 공식 인증 아님</div>
</div>
<div class="toast" id="toast"></div>

<script>
const DIMS = {
  del:{e:"🎯", n:"위임 Delegation", short:"위임", desc:"무엇을·언제 AI에게 맡길지 판단하는 능력"},
  des:{e:"✍️", n:"서술 Description", short:"서술", desc:"원하는 바를 명확히 설명해 좋은 결과를 끌어내는 능력"},
  dis:{e:"🔍", n:"분별 Discernment", short:"분별", desc:"결과물의 품질을 정확히 평가하는 능력"},
  dil:{e:"🛡️", n:"책임 Diligence", short:"책임", desc:"AI 사용의 결과에 책임지는 태도(검증·윤리)"},
};

const SECTORS = {
  write:  {e:"✍️", n:"글쓰기·콘텐츠", ceiling:"이 분야의 능숙한 사용자는 AI를 초안기가 아니라 편집 파트너로 둡니다. 톤·구조·페르소나를 지정해 여러 버전을 만들고, 자기 목소리로 재구성합니다."},
  code:   {e:"💻", n:"코딩·개발",     ceiling:"능숙한 사용자는 코드 생성을 넘어 설계 논의·디버깅·리팩터링·테스트까지 위임하고, 결과를 근거에 기반해 검증합니다."},
  research:{e:"🔍", n:"분석·리서치",   ceiling:"능숙한 사용자는 출처 확인과 교차검증, 반론 요청까지 활용합니다. AI를 비판적 사고의 파트너로 다룹니다."},
  plan:   {e:"🧩", n:"기획·전략",     ceiling:"능숙한 사용자는 발산과 수렴을 반복하고, AI에 반대 관점(데블스 애드버킷)을 맡겨 아이디어를 단련합니다."},
  work:   {e:"⚙️", n:"업무·생산성",   ceiling:"능숙한 사용자는 반복 업무를 한 번에 끝내지 않고, 템플릿·자동화·커스텀 스킬로 시스템을 만들어 둡니다."},
  learn:  {e:"📚", n:"학습·자기계발", ceiling:"능숙한 사용자는 정답 대신 질문을 요청합니다. 맞춤 커리큘럼과 소크라테스식 대화로 AI를 개인 교사로 만듭니다."},
};

// 8문항: 4D × 2. v = 해당 역량 점수(0~10)
const Q = [
  {d:"del", q:"새로운 일이 생기면, 'AI를 쓸까?'를…", o:[
    {e:"🤔", t:"거의 안 따지고 늘 하던 대로 한다", v:2},
    {e:"💡", t:"떠오르면 가끔 써본다", v:6},
    {e:"🎯", t:"'AI가 잘할 일 vs 내가 할 일'을 의식적으로 가른다", v:10}]},
  {d:"del", q:"하나의 큰 작업을 AI에게 맡길 때…", o:[
    {e:"📦", t:"통째로 던지고 결과를 본다", v:3},
    {e:"🔪", t:"가끔 몇 부분으로 나눈다", v:6},
    {e:"🧩", t:"단계로 쪼개 맡길 것과 직접 할 것을 조율한다", v:10}]},
  {d:"des", q:"첫 프롬프트에는 보통…", o:[
    {e:"💬", t:"핵심만 한 줄로 적는다", v:2},
    {e:"📝", t:"원하는 걸 한두 문장 설명한다", v:6},
    {e:"🏗️", t:"역할·맥락·제약·예시까지 갖춰 적는다", v:10}]},
  {d:"des", q:"출력 형식·톤·길이 같은 조건을…", o:[
    {e:"🤷", t:"거의 지정하지 않는다", v:2},
    {e:"📐", t:"가끔 지정한다", v:6},
    {e:"🎚️", t:"필요에 맞게 또박또박 지정한다", v:10}]},
  {d:"dis", q:"AI가 답을 내놓으면…", o:[
    {e:"✅", t:"대체로 그대로 신뢰하고 쓴다", v:2},
    {e:"👀", t:"훑어보고 어색한 부분만 손본다", v:6},
    {e:"⚖️", t:"나름의 기준을 갖고 품질을 평가한다", v:10}]},
  {d:"dis", q:"'그럴듯하지만 틀린 답' 가능성을…", o:[
    {e:"🌀", t:"별로 의식하지 않는다", v:2},
    {e:"🧐", t:"중요한 일일 때 의심한다", v:6},
    {e:"🔬", t:"항상 염두에 두고 사실·출처를 교차확인한다", v:10}]},
  {d:"dil", q:"AI로 만든 결과물의 최종 책임은…", o:[
    {e:"🤖", t:"AI가 만든 거니 어느 정도는 AI 몫", v:2},
    {e:"🙂", t:"반반쯤", v:5},
    {e:"🙋", t:"전적으로 내 책임이라 보고 직접 검토한다", v:10}]},
  {d:"dil", q:"민감정보·저작권·편향 같은 위험을…", o:[
    {e:"😌", t:"딱히 신경 쓰지 않는다", v:3},
    {e:"⚠️", t:"생각나면 점검한다", v:6},
    {e:"🛡️", t:"습관적으로 점검하고 선을 지킨다", v:10}]},
];

// 모드 진단 (레벨엔 미반영, 성향 표시용)
const MODEQ = {q:"AI와 일하는 방식, 어디에 가장 가까워요?", o:[
  {e:"⚡", t:"반복 작업을 자동화해 시간을 아낀다", mode:"auto"},
  {e:"🤝", t:"주고받으며 내 능력을 확장한다", mode:"augment"},
  {e:"🚀", t:"목표만 주고 AI가 알아서 진행하게 한다", mode:"agency"}]};
const MODES = {
  auto:   {e:"⚡", n:"자동화형 (Automation)", d:"반복을 줄여 효율을 만드는 타입. 손이 덜 가는 시스템을 좋아합니다."},
  augment:{e:"🤝", n:"증강형 (Augmentation)", d:"AI와 함께 사고하며 결과를 끌어올리는 타입. 가장 균형 잡힌 협업 방식."},
  agency: {e:"🚀", n:"위임형 (Agency)", d:"목표 중심으로 자율 위임하는 타입. 잘 쓰면 강력, 분별·책임이 더 중요해집니다."},
};

const TIERS = [
  {min:0,  e:"🌱", n:"AI 입문자",  d:"이제 막 발을 담그는 단계. 시작이 절반입니다."},
  {min:25, e:"🧭", n:"AI 탐험가",  d:"이것저것 눌러보며 감을 잡는 중. 방향이 잡히고 있어요."},
  {min:42, e:"⚙️", n:"AI 활용가",  d:"도구로 제법 부릴 줄 압니다. 실용 궤도에 올랐어요."},
  {min:61, e:"🤝", n:"AI 협업가",  d:"AI와 주고받으며 결과를 끌어올리는 단계. 상위권입니다."},
  {min:78, e:"🧠", n:"AI 디렉터",  d:"AI를 의도대로 지휘하는 경지. 4D가 고르게 무르익었어요."},
  {min:91, e:"🏆", n:"AI 플루언트", d:"네 역량을 자유자재로 쓰는 드문 영역. 이제 가르칠 차례입니다."},
];

let state={step:-1, sector:null, scores:{del:0,des:0,dis:0,dil:0}, mode:null, answers:[]};
const card=document.getElementById('card');
function toast(m){const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(window._t); window._t=setTimeout(()=>t.classList.remove('show'),2200);}
const TOTAL = Q.length + 1; // +모드

function renderIntro(){
  card.className="card reveal";
  card.innerHTML=`
    <div class="center"><span class="kicker">Anthropic AI Fluency · 4D</span></div>
    <div class="center" style="font-size:54px;margin-bottom:8px">🧭</div>
    <h1 class="center">AI 활용 역량 진단</h1>
    <p class="sub center" style="margin:0 0 24px">잘 쓰는 것 같긴 한데, 정확히 어디가 강하고 약한지.<br>
    앤트로픽 4D 프레임워크(위임·서술·분별·책임)로 짚어드립니다.</p>
    <button class="btn" onclick="start()">진단 시작</button>
    <p class="sub center" style="font-size:12px;margin:14px 0 0;color:#b0b8c1">9문항 · 약 2분 · 계산은 이 화면 안에서만</p>`;
}
function start(){ state={step:0,sector:null,scores:{del:0,des:0,dis:0,dil:0},mode:null,answers:[]}; renderSector(); }

function topbar(idx){
  const pct = idx<0 ? 4 : 6+((idx)/(TOTAL))*94;
  const label = idx<0 ? "시작" : `${idx+1} / ${TOTAL}`;
  return `<div class="topbar"><div class="progress"><span style="width:${pct}%"></span></div><div class="pcount">${label}</div></div>`;
}
function renderSector(){
  card.className="card reveal";
  const cells=Object.entries(SECTORS).map(([k,v])=>`<div class="sector" onclick="pickSector('${k}')"><div class="se">${v.e}</div><div class="sn">${v.n}</div></div>`).join('');
  card.innerHTML=`${topbar(-1)}<div class="q">AI를 주로 어디에 쓰세요?</div><div class="sgrid">${cells}</div>`;
}
function pickSector(k){ state.sector=k; state.step=0; renderStep(); }

function renderStep(){
  const i=state.step;
  if(i<Q.length){
    const item=Q[i], dim=DIMS[item.d];
    const opts=item.o.map((o,idx)=>`<div class="opt" onclick="answer(${idx})"><span class="emo">${o.e}</span><span>${o.t}</span></div>`).join('');
    card.className="card reveal";
    card.innerHTML=`${topbar(i)}<div class="dimtag">${dim.e} ${dim.n}</div><div class="q">${item.q}</div>${opts}
      ${i>0?'<button class="btn sec" onclick="back()">← 이전</button>':''}`;
  } else {
    const opts=MODEQ.o.map((o,idx)=>`<div class="opt" onclick="answerMode(${idx})"><span class="emo">${o.e}</span><span>${o.t}</span></div>`).join('');
    card.className="card reveal";
    card.innerHTML=`${topbar(i)}<div class="dimtag">🧩 작업 모드</div><div class="q">${MODEQ.q}</div>${opts}
      <button class="btn sec" onclick="back()">← 이전</button>`;
  }
}
function answer(idx){
  const item=Q[state.step], o=item.o[idx];
  state.scores[item.d]+=o.v; state.answers[state.step]={t:item.d,v:o.v};
  state.step++; renderStep();
}
function answerMode(idx){ state.mode=MODEQ.o[idx].mode; state.answers[state.step]={mode:state.mode}; renderResult(); }
function back(){
  state.step--; const a=state.answers[state.step];
  if(a && a.t) state.scores[a.t]-=a.v;
  renderStep();
}

function dimScore(d){ // 2문항 × 10 = 20 만점 → 100
  return Math.round(state.scores[d]/20*100);
}
function tip(d){
  return {
    del:"어떤 일을 AI에 맡길지 의식적으로 구분해보세요. '무엇을 위임할지' 정하는 것이 곧 실력입니다.",
    des:"역할·맥락·제약·예시를 갖춰 서술하면 결과가 달라집니다. 길이보다 구조예요.",
    dis:"AI 답을 '그럴듯하지만 틀릴 수 있다'고 전제하고, 기준을 갖고 평가·교차확인하세요.",
    dil:"결과물의 최종 책임은 사용자에게 있습니다. 사실·출처·편향을 점검하는 습관을 들이세요.",
  }[d];
}

let LAST=null;
function renderResult(){
  const sc={del:dimScore("del"),des:dimScore("des"),dis:dimScore("dis"),dil:dimScore("dil")};
  const overall=Math.round((sc.del+sc.des+sc.dis+sc.dil)/4);
  let tIdx=0; TIERS.forEach((t,i)=>{ if(overall>=t.min) tIdx=i; });
  const tier=TIERS[tIdx];
  const sec=SECTORS[state.sector], mode=MODES[state.mode];
  const order=["del","des","dis","dil"];
  const topD=order.reduce((a,b)=>sc[a]>=sc[b]?a:b);
  const lowD=order.reduce((a,b)=>sc[a]<=sc[b]?a:b);
  LAST={overall,tier,topD,sc};
  const C=2*Math.PI*64, off=C*(1-overall/100);
  // 4D 레이더
  const cx=130,cy=120,R=86;
  const pts=order.map((d,i)=>{const ang=-Math.PI/2+i*(Math.PI/2); const r=R*sc[d]/100; return [cx+r*Math.cos(ang), cy+r*Math.sin(ang)];});
  const poly=pts.map(p=>`${p[0].toFixed(0)},${p[1].toFixed(0)}`).join(" ");
  let grid="";
  [0.25,0.5,0.75,1].forEach(g=>{const gp=order.map((d,i)=>{const ang=-Math.PI/2+i*(Math.PI/2);return `${(cx+R*g*Math.cos(ang)).toFixed(0)},${(cy+R*g*Math.sin(ang)).toFixed(0)}`;}).join(" "); grid+=`<polygon points="${gp}" fill="none" stroke="#e5e8eb"/>`;});
  let labels="";
  order.forEach((d,i)=>{const ang=-Math.PI/2+i*(Math.PI/2); const lx=cx+(R+20)*Math.cos(ang), ly=cy+(R+20)*Math.sin(ang); labels+=`<text x="${lx.toFixed(0)}" y="${(ly+4).toFixed(0)}" fill="#8b95a1" font-size="12" font-weight="700" text-anchor="middle">${DIMS[d].short} ${sc[d]}</text>`;});
  const bars=order.map(d=>`<div class="drow"><span>${DIMS[d].e} <b>${DIMS[d].n}</b></span><span>${sc[d]}/100</span></div><div class="bar"><span style="width:${sc[d]}%"></span></div>`).join("");
  card.className="card reveal";
  card.innerHTML=`
    <div class="secTag">${sec.e} ${sec.n} · 종합 AI 활용 역량</div>
    <div class="ring"><svg width="140" height="140">
      <circle cx="70" cy="70" r="64" fill="none" stroke="#eef1f4" stroke-width="11"/>
      <circle cx="70" cy="70" r="64" fill="none" stroke="#3182f6" stroke-width="11" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
    </svg><div class="ctr"><div class="num">${overall}</div><div class="of">/ 100</div></div></div>
    <div class="tier">${tier.e} ${tier.n}</div>
    <div class="tierd">${tier.d}</div>
    <svg class="radar" width="260" height="240" viewBox="0 0 260 240">${grid}<polygon points="${poly}" fill="rgba(49,130,246,.18)" stroke="#3182f6" stroke-width="2"/>${labels}</svg>
    ${bars}
    <div class="modebox"><div class="mn">${mode.e} ${mode.n}</div><div class="md">${mode.d}</div></div>
    <div class="box"><h3>💪 가장 강한 역량 — ${DIMS[topD].n}</h3><p>${DIMS[topD].desc}. 여기선 이미 안정적이에요.</p></div>
    <div class="box"><h3>🎯 다음 레벨 포인트 — ${DIMS[lowD].n}</h3><p>${tip(lowD)}</p></div>
    <div class="box"><h3>🏔️ 이 분야 능숙한 사용자는</h3><p>${sec.ceiling}</p></div>
    <div class="btnrow">
      <button class="btn" onclick="share()">결과 공유하기</button>
      <button class="btn sec" style="flex:0 0 36%" onclick="renderIntro()">다시 하기</button>
    </div>`;
}

async function share(){
  if(!LAST) return;
  const {overall,tier,topD}=LAST;
  const text=`나의 AI 활용 역량: ${tier.n} (${overall}점) · 강점은 ${DIMS[topD].short}.\n앤트로픽 4D 프레임워크 기반 자가진단 👇`;
  const url=location.href;
  try{
    if(navigator.share){ await navigator.share({title:"AI 활용 역량 진단", text, url}); }
    else { await navigator.clipboard.writeText(text+"\n"+url); toast("결과가 복사됐어요 📋"); }
  }catch(e){}
}

renderIntro();
</script>
</body>
</html>
